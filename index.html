<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRON LOG</title>
</head>
<body style="background:#111;color:#fff;font-family:Arial;padding:20px">

<h1 style="color:#e8ff47">IRON LOG</h1>
<textarea id="txt" style="width:100%;height:150px;background:#222;color:#fff;border:1px solid #444;padding:10px;font-size:13px" placeholder="Paste workout here..."></textarea>
<br><br>
<button id="btn" style="width:100%;padding:15px;background:#e8ff47;color:#000;border:none;font-size:18px;font-weight:bold">PARSE WORKOUT</button>
<div id="out" style="margin-top:20px"></div>

<script>
document.getElementById('btn').onclick = function() {
  var txt = document.getElementById('txt').value;
  document.getElementById('out').innerHTML = '<p style="color:#e8ff47">Button works! Text length: ' + txt.length + '</p>';
};
</script>

</body>
</html>
