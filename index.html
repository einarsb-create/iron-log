<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IRON LOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;color:#f0f0f0;font-family:Arial,sans-serif;font-size:15px}
.nav{position:fixed;top:0;left:0;right:0;background:#111;border-bottom:2px solid #e8ff47;height:50px;display:flex;align-items:center;padding:0 16px;z-index:99}
.logo{font-size:22px;font-weight:900;color:#e8ff47;letter-spacing:3px}
.page{display:none;padding:60px 14px 75px}
.page.active{display:block}
textarea{width:100%;height:180px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f0f0f0;font-size:12px;padding:12px;resize:none;outline:none;margin-top:10px}
.btn{display:block;width:100%;padding:14px;border-radius:8px;border:none;font-size:18px;font-weight:900;cursor:pointer;margin-top:10px}
.btn-y{background:#e8ff47;color:#000}
.section-title{font-size:22px;font-weight:900;color:#e8ff47;margin-bottom:4px}
.section-sub{color:#666;font-size:12px;margin-bottom:12px}
.preview-box{display:none;margin-top:14px;background:#1a1a1a;border-radius:8px;border:1px solid #333;overflow:hidden}
.preview-hd{padding:9px 13px;border-bottom:1px solid #333;font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px}
.prev-row{padding:10px 13px;border-bottom:1px solid #222;display:flex;align-items:center;gap:10px}
.prev-row:last-child{border-bottom:none}
.prev-num{font-size:17px;font-weight:900;color:#e8ff47;min-width:20px}
.prev-name{flex:1;font-weight:700;font-size:14px}
.prev-meta{font-size:11px;color:#666}
.prog-wrap{background:#333;border-radius:4px;height:5px;margin-bottom:14px;overflow:hidden}
.prog-bar{height:100%;background:#e8ff47;border-radius:4px}
.card{background:#1a1a1a;border:1px solid #333;border-radius:10px;margin-bottom:10px;overflow:hidden}
.card.all-done{border-color:#2a4a1a;background:#111a0a}
.card-head{padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.card-num{font-size:20px;font-weight:900;color:#e8ff47;min-width:24px;line-height:1.2}
.card.all-done .card-num{color:#3a6a1a}
.card-info{flex:1}
.card-name{font-weight:700;font-size:15px;line-height:1.3}
.card.all-done .card-name{color:#555}
.card-meta{font-size:11px;color:#666;margin-top:2px}
.card-sug{font-size:11px;color:#ff6b35;margin-top:3px;font-weight:700}
.card-hist{font-size:11px;color:#5a9a5a;margin-top:2px}
.card-arr{color:#666;font-size:22px;line-height:1;padding-top:1px;flex-shrink:0}
.card-body{display:none;padding:0 14px 12px}
.card.open .card-body{display:block}
.sec-label{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;padding:6px 0 2px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;padding:0 0 6px}
th:last-child{text-align:center}
.sr td{padding:4px 0;vertical-align:middle}
.sr.done .s-lbl{color:#3a6a1a}
.s-lbl{font-size:14px;font-weight:700;color:#555;width:48px}
.s-tgt{font-size:11px;color:#555;width:58px}
.w-inp{background:#222;border:1px solid #333;border-radius:6px;color:#f0f0f0;font-size:14px;padding:6px 8px;width:74px;outline:none;text-align:right}
.w-unit{font-size:11px;color:#555;margin-left:3px}
.chk-col{text-align:center;width:38px}
.chk{width:26px;height:26px;border-radius:6px;border:2px solid #333;background:none;cursor:pointer;display:inline-block;vertical-align:middle;position:relative}
.chk.on{background:#e8ff47;border-color:#e8ff47}
.chk.on:after{content:"";position:absolute;left:6px;top:3px;width:8px;height:12px;border:3px solid #000;border-top:none;border-left:none;transform:rotate(45deg)}
.wu-sect{margin-bottom:10px}
.wu-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;padding:8px 14px 5px;border-top:1px solid #222}
.wu-row{padding:6px 14px;font-size:13px;color:#666;display:flex;align-items:center;gap:10px}
.wu-chk{width:19px;height:19px;border-radius:4px;border:1.5px solid #333;background:none;cursor:pointer;display:inline-block;flex-shrink:0;position:relative}
.wu-chk.on{background:#333;border-color:#3a6a1a}
.fin-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#555;padding:8px 14px 5px;border-top:1px solid #222;margin-top:4px}
.hist-title{font-size:22px;font-weight:900;color:#e8ff47;margin-bottom:14px}
.sess{background:#1a1a1a;border:1px solid #333;border-radius:10px;margin-bottom:10px;overflow:hidden}
.sess-head{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.sess-name{font-weight:700;font-size:14px}
.sess-date{font-size:11px;color:#666;margin-top:2px}
.sess-badge{background:#222;border-radius:6px;padding:3px 8px;font-size:11px;color:#666}
.sess-body{display:none;padding:0 14px 12px}
.sess.open .sess-body{display:block}
.h-ex{padding:8px 0;border-top:1px solid #222}
.h-ex-name{font-weight:700;font-size:13px;margin-bottom:4px}
.h-sets{display:flex;flex-wrap:wrap;gap:4px}
.h-set{background:#222;border-radius:5px;padding:3px 8px;font-size:11px}
.h-set.on{border:1px solid #2a4a1a;color:#6ab85a}
.empty{text-align:center;padding:40px 20px;color:#555;font-size:14px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#111;border-top:1px solid #333;display:flex;height:60px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:#555;cursor:pointer;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.btab.on{color:#e8ff47}
.btab svg{width:20px;height:20px}
.toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(10px);background:#e8ff47;color:#000;font-weight:900;font-size:13px;padding:8px 16px;border-radius:100px;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav class="nav"><span class="logo">IRON LOG</span></nav>

<div id="pg-new" class="page active">
  <div class="section-title" style="margin-top:4px">NEW SESSION</div>
  <div class="section-sub">Paste your ChatGPT workout below</div>
  <textarea id="txt" placeholder="Paste workout here..."></textarea>
  <button class="btn btn-y" id="parse-btn">PARSE WORKOUT</button>
  <div class="preview-box" id="preview">
    <div class="preview-hd">Detected exercises</div>
    <div id="prev-list"></div>
    <div style="padding:10px 13px">
      <button class="btn btn-y" id="start-btn" style="margin-top:0">START SESSION</button>
    </div>
  </div>
</div>

<div id="pg-workout" class="page">
  <div class="section-title" id="wk-title">WORKOUT</div>
  <div class="section-sub" id="wk-sub"></div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  <div id="wk-content"></div>
  <button class="btn btn-y" id="finish-btn" style="margin-top:14px">FINISH SESSION</button>
</div>

<div id="pg-history" class="page">
  <div class="hist-title">HISTORY</div>
  <div id="hist-list"></div>
</div>

<nav class="bnav">
  <button class="btab on" id="tab-new">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M5 4h2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    NEW
  </button>
  <button class="btab" id="tab-workout">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
    WORKOUT
  </button>
  <button class="btab" id="tab-history">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    HISTORY
  </button>
</nav>
<div class="toast" id="toast"></div>

<script>
var cw = null;
var wh = [];
try { wh = JSON.parse(localStorage.getItem('il3') || '[]'); } catch(e) {}

// ── NAV ──
function showPage(name) {
  var ids = ['new','workout','history'];
  for (var i = 0; i < ids.length; i++) {
    document.getElementById('pg-' + ids[i]).style.display = 'none';
    document.getElementById('tab-' + ids[i]).className = 'btab';
  }
  document.getElementById('pg-' + name).style.display = 'block';
  document.getElementById('tab-' + name).className = 'btab on';
  if (name === 'history') renderHistory();
}
// init pages
document.getElementById('pg-new').style.display = 'block';
document.getElementById('pg-workout').style.display = 'none';
document.getElementById('pg-history').style.display = 'none';

document.getElementById('tab-new').onclick = function(){ showPage('new'); };
document.getElementById('tab-workout').onclick = function(){ showPage('workout'); };
document.getElementById('tab-history').onclick = function(){ showPage('history'); };

// ── TOAST ──
function showToast(msg) {
  var t = document.getElementById('toast');
  t.innerHTML = msg;
  t.className = 'toast on';
  setTimeout(function(){ t.className = 'toast'; }, 2500);
}

// ── PARSER ──
function isExHead(l) {
  if (l.length < 3) return false;
  if (/^[1-9]/.test(l) && l.indexOf('\u20E3') !== -1) return true;
  if (/^[1-9][0-9]*\.\s+[A-Za-z]/.test(l)) return true;
  return false;
}

function cleanName(l) {
  l = l.replace(/^[1-9][0-9]?\uFE0F\u20E3\s*/, '');
  l = l.replace(/^[1-9][0-9]*\.\s+/, '');
  l = l.replace(/^(Primary|Secondary|Accessory|Athletic Block|Micro.Conditioning)\s*[-\u2013\u2014]+\s*/i, '');
  l = l.replace(/\s*\(Primary[^)]*\)/gi,'').replace(/\s*\(Heavy\)/gi,'').replace(/\s*\(Paused\)/gi,'');
  return l.trim();
}

function parseWorkout() {
  var txt = document.getElementById('txt').value.trim();
  if (!txt) { showToast('Paste a workout first!'); return; }

  var lines = txt.split('\n');
  var exercises = [], warmup = [], finishers = [];
  var cur = null, inWU = false, inWUProg = false, inSub = false, finCur = null;

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l) continue;

    // Top-level warmup heading
    if (/^warm.?up\s*\(/i.test(l)) { inWU = true; continue; }

    // Exercise heading
    if (isExHead(l)) {
      if (cur) exercises.push(cur);
      if (finCur) { finishers.push(finCur); finCur = null; }
      inWU = false; inWUProg = false; inSub = false;
      cur = { name: cleanName(l), sets:4, reps:'8-10', weight:'', wu:[], topset:null, backoff:null };
      continue;
    }

    // Finisher headings
    if (/^(conditioning|optional finisher|breathing|grip\s*\(optional\)|session notes|athletic finisher|optional conditioning)/i.test(l)) {
      if (cur) { exercises.push(cur); cur = null; }
      if (finCur) finishers.push(finCur);
      finCur = { title: l, lines: [] };
      inWU = false; continue;
    }

    // Stop sections
    if (/^(notes for today|key instruction|if session runs|if it feels short)/i.test(l)) {
      if (cur) { exercises.push(cur); cur = null; }
      if (finCur) { finishers.push(finCur); finCur = null; }
      inWU = false; continue;
    }

    if (finCur) { finCur.lines.push(l); continue; }
    if (inWU) { if (l.length > 3 && !/^\d+.?\d+\s*min/i.test(l)) warmup.push(l.replace(/^[-*]\s*/,'')); continue; }
    if (!cur) continue;

    // Substitution skip
    if (/^\u2757|^substitute\b/i.test(l)) { inSub = true; continue; }
    if (inSub) { if (/^(strict|working sets|top set|back.off|\d+ sets)/i.test(l)) inSub = false; else continue; }

    // Sub-section markers
    if (/^warm.?up sets?:?$|^warm.?up:?$|^warm.?up progression/i.test(l)) { inWUProg = true; continue; }
    if (/^(neural primer|strict cues|focus:|working sets?:?)$/i.test(l)) { inWUProg = false; continue; }

    // Primer single -> warmup
    if (/^primer single:/i.test(l)) {
      var pm = l.match(/~?([\d.]+)/);
      var pr = l.match(/[xX\xD7]\s*(\d+)/);
      if (pm) cur.wu.push({ w: pm[1], r: pr ? pr[1] : '1' });
      continue;
    }

    // Neural primer set (skip)
    if (/@\s*\+?[\d.]+\s*kg/.test(l) && /^\d+\s*[xX\xD7]\s*\d+/.test(l)) continue;

    // Warmup prog sets
    if (inWUProg) {
      if (/^bodyweight/i.test(l)) {
        var bwr = l.match(/[xX\xD7]\s*(\d+)/);
        cur.wu.push({ w:'BW', r: bwr ? bwr[1] : '5' });
      } else if (/^[+\d~]/.test(l) && /[xX\xD7]/.test(l)) {
        var wup = l.match(/~?\+?([\d.]+)/);
        var rp = l.match(/[xX\xD7]\s*(\d+)/);
        if (wup && rp) cur.wu.push({ w: wup[1], r: rp[1] });
      }
      continue;
    }

    // Top set
    if (/^top set:/i.test(l)) {
      var tsr = l.match(/([\d][\d\u2013\-]*)\s*reps?/i);
      var tsw = l.match(/\+?~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      cur.topset = { r: tsr ? tsr[1] : '4-6', w: tsw ? tsw[1] : '' };
      continue;
    }

    // Arrow weight line for top set
    if (/^[\u2192\->]/.test(l) && cur.topset) {
      var aw = l.match(/~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      if (aw) cur.topset.w = aw[1];
      continue;
    }

    // Back-off
    if (/^back.?off:/i.test(l)) {
      var bcn = l.match(/(\d+)\s*[xX\xD7]/);
      var bcr = l.match(/[xX\xD7]\s*(\d+)/);
      var bcw = l.match(/@\s*\+?~?([\d.]+)\s*kg/);
      cur.backoff = { n: bcn ? parseInt(bcn[1]) : 3, r: bcr ? bcr[1] : '5', w: bcw ? bcw[1] : '' };
      continue;
    }

    // Suggested weight
    if (/^suggested[\s:]|suggested load|suggested weight/i.test(l)) {
      var nl = lines[i+1] ? lines[i+1].trim() : '';
      var sv = (l+' '+nl).match(/\+?~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      if (sv && !cur.weight) cur.weight = sv[1];
      continue;
    }
    if (/^[\d.]+\s*[\u2013\-]\s*[\d.]+\s*kg/.test(l) || /^\+?[\d.]+\s*kg$/.test(l)) {
      var sv2 = l.match(/([\d.]+)/);
      if (sv2 && !cur.weight) cur.weight = sv2[1];
    }

    // Standard sets x reps
    if (!cur.topset) {
      var sm = l.match(/^(\d+)\s*[xX\xD7]\s*([\d][\d\u2013\-\/]*)/);
      if (!sm) sm = l.match(/^(\d+)\s*sets?\s*[xX\xD7]\s*([\d][\d\u2013\-]*)/i);
      if (sm) { cur.sets = parseInt(sm[1]); cur.reps = sm[2]; continue; }
    }
  }
  if (cur) exercises.push(cur);
  if (finCur) finishers.push(finCur);

  if (!exercises.length) { showToast('No exercises found'); return; }

  for (var ei = 0; ei < exercises.length; ei++) exercises[ei].histSug = getLastW(exercises[ei].name);

  var title = 'WORKOUT', sub = '';
  for (var ti = 0; ti < lines.length; ti++) {
    var tl = lines[ti].trim();
    if (title === 'WORKOUT' && /day\s*\d/i.test(tl)) title = tl.replace(/^[\u2014\u2013\-]+/,'').trim().toUpperCase();
    if (/week\s*\d/i.test(tl) || /^target:/i.test(tl)) sub += tl + ' ';
  }

  cw = { title:title, sub:sub.trim(), warmup:warmup, exercises:exercises, finishers:finishers };

  var html = '';
  for (var pi = 0; pi < exercises.length; pi++) {
    var ex = exercises[pi];
    var ew = ex.topset ? ex.topset.w : ex.weight;
    var ets = ex.topset ? (1 + (ex.backoff ? ex.backoff.n : 0)) : ex.sets;
    html += '<div class="prev-row"><span class="prev-num">'+(pi+1)+'</span><span class="prev-name">'+ex.name+'</span><span class="prev-meta">'+ets+' sets'+(ew?' &middot; '+ew+'kg':'')+'</span></div>';
  }
  document.getElementById('prev-list').innerHTML = html;
  document.getElementById('preview').style.display = 'block';
  showToast('Found ' + exercises.length + ' exercises!');
}

// ── HISTORY WEIGHT ──
function getLastW(name) {
  var n1 = name.toLowerCase().replace(/[^a-z0-9]/g,'');
  for (var i = wh.length-1; i >= 0; i--) {
    for (var j = 0; j < wh[i].exercises.length; j++) {
      var ex = wh[i].exercises[j];
      if (ex.name.toLowerCase().replace(/[^a-z0-9]/g,'') === n1) {
        var best = 0;
        for (var k = 0; k < ex.sets.length; k++) {
          if (ex.sets[k].done && ex.sets[k].w) {
            var v = parseFloat(ex.sets[k].w);
            if (v > best) best = v;
          }
        }
        if (best) return { w: best };
      }
    }
  }
  return null;
}

function sugW(ex) {
  if (ex.histSug) return (ex.histSug.w + 2.5).toFixed(1);
  if (ex.topset && ex.topset.w) return ex.topset.w;
  return ex.weight || '';
}

// ── RENDER WORKOUT ──
function startWorkout() {
  if (!cw) return;
  renderWorkout();
  showPage('workout');
}

function renderWorkout() {
  document.getElementById('wk-title').innerHTML = cw.title;
  document.getElementById('wk-sub').innerHTML = cw.sub;

  var html = '';

  // Warmup
  if (cw.warmup.length) {
    html += '<div class="wu-sect"><div class="wu-title">Warm-up</div>';
    for (var wi = 0; wi < cw.warmup.length; wi++) {
      html += '<div class="wu-row"><button class="wu-chk" onclick="this.className=this.className===\'wu-chk\'?\'wu-chk on\':\'wu-chk\'"></button><span>'+cw.warmup[wi]+'</span></div>';
    }
    html += '</div>';
  }

  // Exercises
  for (var ei = 0; ei < cw.exercises.length; ei++) {
    var ex = cw.exercises[ei];
    var bw = sugW(ex);
    var hline = ex.histSug
      ? '<div class="card-hist">Last: '+ex.histSug.w+'kg &rarr; Try '+bw+'kg today</div>'
      : (bw ? '<div class="card-sug">Suggested: '+bw+'kg</div>' : '');
    var ts = ex.topset ? (1 + (ex.backoff ? ex.backoff.n : 0)) : ex.sets;

    var rows = '';
    var si = 0;

    if (ex.wu.length) {
      rows += '<tr><td colspan="4" class="sec-label">Warm-up sets</td></tr>';
      for (var wu = 0; wu < ex.wu.length; wu++) {
        var ws = ex.wu[wu];
        rows += '<tr class="sr"><td class="s-lbl">W'+(wu+1)+'</td><td class="s-tgt">'+(ws.w==='BW'?'BW':'~'+ws.w+'kg')+' x'+ws.r+'</td><td><input class="w-inp" type="number" step="0.5" placeholder="'+(ws.w==='BW'?'0':ws.w)+'" style="width:66px"><span class="w-unit">kg</span></td><td class="chk-col"><button class="chk" onclick="doneChk(this)"></button></td></tr>';
      }
    }

    rows += '<tr><td colspan="4" class="sec-label">Working sets</td></tr>';

    if (ex.topset) {
      rows += '<tr class="sr" data-ei="'+ei+'" data-si="'+si+'"><td class="s-lbl">TOP</td><td class="s-tgt">'+ex.topset.r+' reps</td><td><input class="w-inp" type="number" step="0.5" placeholder="'+(ex.topset.w||bw||'')+'" data-ei="'+ei+'" data-si="'+si+'"><span class="w-unit">kg</span></td><td class="chk-col"><button class="chk" data-ei="'+ei+'" data-si="'+si+'" onclick="doneChk(this)"></button></td></tr>';
      si++;
      if (ex.backoff) {
        for (var b = 0; b < ex.backoff.n; b++) {
          rows += '<tr class="sr" data-ei="'+ei+'" data-si="'+si+'"><td class="s-lbl">BO'+(b+1)+'</td><td class="s-tgt">'+ex.backoff.r+' reps</td><td><input class="w-inp" type="number" step="0.5" placeholder="'+(ex.backoff.w||bw||'')+'" data-ei="'+ei+'" data-si="'+si+'"><span class="w-unit">kg</span></td><td class="chk-col"><button class="chk" data-ei="'+ei+'" data-si="'+si+'" onclick="doneChk(this)"></button></td></tr>';
          si++;
        }
      }
    } else {
      for (var s = 0; s < ex.sets; s++) {
        rows += '<tr class="sr" data-ei="'+ei+'" data-si="'+si+'"><td class="s-lbl">S'+(s+1)+'</td><td class="s-tgt">'+ex.reps+' reps</td><td><input class="w-inp" type="number" step="0.5" placeholder="'+(bw||'')+'" data-ei="'+ei+'" data-si="'+si+'"><span class="w-unit">kg</span></td><td class="chk-col"><button class="chk" data-ei="'+ei+'" data-si="'+si+'" onclick="doneChk(this)"></button></td></tr>';
        si++;
      }
    }
