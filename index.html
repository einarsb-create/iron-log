<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0f0f">
<title>IRON LOG</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0f0f0f;--s1:#1a1a1a;--s2:#222;--bd:#2e2e2e;--ac:#e8ff47;--ac2:#ff6b35;--tx:#f0f0f0;--mu:#666;--gn:#5a9a5a}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:15px;min-height:100dvh}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 16px;height:56px}
.logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;color:var(--ac)}
.page{display:none;padding:68px 16px 80px}
.page.active{display:block}
textarea{width:100%;background:var(--s1);border:1px solid var(--bd);border-radius:10px;color:var(--tx);font-family:'DM Mono',monospace;font-size:12px;line-height:1.6;padding:14px;resize:none;height:200px;outline:none}
textarea:focus{border-color:var(--ac)}
.btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;cursor:pointer;margin-top:10px}
.btn-y{background:var(--ac);color:#000}
.btn-y:active{background:#d4eb3a}
.preview{margin-top:16px;background:var(--s1);border-radius:10px;border:1px solid var(--bd);overflow:hidden;display:none}
.preview-hd{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:11px;font-weight:600;letter-spacing:1px;color:var(--mu);text-transform:uppercase}
.prev-ex{padding:11px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px}
.prev-ex:last-child{border-bottom:none}
.prev-n{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--ac);min-width:22px}
.prev-name{font-weight:500;flex:1;font-size:14px}
.prev-meta{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace}
.wk-hd{margin-bottom:16px}
.wk-title{font-family:'Bebas Neue',sans-serif;font-size:34px;letter-spacing:1px;line-height:1.1}
.wk-sub{color:var(--mu);font-size:12px;margin-top:4px}
.prog-wrap{background:var(--s2);border-radius:4px;height:4px;margin-top:10px;overflow:hidden}
.prog-bar{height:100%;background:var(--ac);border-radius:4px;transition:width .3s}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card.done{border-color:#2a3a1a;background:#131a0e}
.card-hd{padding:13px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer}
.card-num{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--ac);min-width:26px}
.card.done .card-num{color:#4a6a2a}
.card-info{flex:1}
.card-name{font-weight:600;font-size:15px}
.card.done .card-name{color:#555}
.card-meta{font-size:12px;color:var(--mu);margin-top:2px;font-family:'DM Mono',monospace}
.card-sug{font-size:11px;color:var(--ac2);margin-top:3px;font-weight:500}
.card-hist{font-size:11px;color:var(--gn);margin-top:2px}
.chevron{color:var(--mu);font-size:18px;transition:transform .2s;padding-top:2px;flex-shrink:0}
.card.open .chevron{transform:rotate(180deg)}
.card-body{display:none;padding:0 15px 13px}
.card.open .card-body{display:block}
.stbl{width:100%;border-collapse:collapse;margin-bottom:8px}
.stbl th{text-align:left;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:0 0 7px;font-family:'DM Mono',monospace}
.stbl th:last-child{text-align:center}
.srow td{padding:4px 0;vertical-align:middle}
.slbl{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--mu);width:52px;white-space:nowrap}
.srow.done .slbl{color:#4a6a2a}
.starget{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;width:60px}
.winput{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-family:'DM Mono',monospace;font-size:14px;padding:7px 8px;width:76px;outline:none;text-align:right}
.winput:focus{border-color:var(--ac)}
.wunit{font-size:11px;color:var(--mu);margin-left:3px}
.chkcol{text-align:center;width:40px}
.chk{width:27px;height:27px;border-radius:7px;border:2px solid var(--bd);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .15s}
.chk.on{background:var(--ac);border-color:var(--ac)}
.chk svg{display:none}
.chk.on svg{display:block}
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:7px 0 3px;font-family:'DM Mono',monospace}
.notes{background:var(--s2);border-radius:7px;padding:9px 11px;font-size:12px;color:var(--mu);line-height:1.5;margin-top:4px;border-left:3px solid var(--ac2)}
.wu-hd{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--mu);padding:10px 15px 6px;border-top:1px solid var(--bd);display:flex;align-items:center;gap:6px;margin-bottom:2px}
.wu-item{padding:7px 15px;font-size:13px;color:var(--mu);display:flex;align-items:center;gap:10px}
.wu-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid var(--bd);background:none;cursor:pointer;flex-shrink:0}
.wu-chk.on{background:var(--s2);border-color:#4a6a2a}
.fin-star{font-size:16px;min-width:26px;text-align:center}
.hist-hd{margin-bottom:16px}
.hist-hd h2{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:1px;color:var(--ac)}
.sess{background:var(--s1);border:1px solid var(--bd);border-radius:12px;margin-bottom:10px;overflow:hidden}
.sess-hd{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.sess-title{font-weight:600;font-size:14px}
.sess-date{font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;margin-top:2px}
.sess-badge{background:var(--s2);border-radius:6px;padding:4px 9px;font-size:11px;font-family:'DM Mono',monospace;color:var(--mu)}
.sess-body{display:none;padding:0 15px 13px}
.sess.open .sess-body{display:block}
.hex{padding:9px 0;border-top:1px solid var(--bd)}
.hex-name{font-weight:500;font-size:13px;margin-bottom:5px}
.hsets{display:flex;flex-wrap:wrap;gap:5px}
.hset{background:var(--s2);border-radius:6px;padding:4px 9px;font-size:12px;font-family:'DM Mono',monospace}
.hset.on{border:1px solid #2a3a1a;color:#7ab85a}
.empty{text-align:center;padding:50px 20px;color:var(--mu);font-size:14px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--bd);display:flex;height:62px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--mu);cursor:pointer;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:500}
.btab.on{color:var(--ac)}
.btab svg{width:22px;height:22px}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ac);color:#000;font-weight:600;font-size:13px;padding:9px 18px;border-radius:100px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<nav class="nav"><span class="logo">IRON LOG</span></nav>

<div id="pg-new" class="page active">
  <div style="margin-bottom:14px">
    <h2 style="font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:1px;color:var(--ac)">NEW SESSION</h2>
    <p style="color:var(--mu);font-size:13px;margin-top:3px">Paste your ChatGPT workout below</p>
  </div>
  <textarea id="txt" placeholder="Paste your workout here..."></textarea>
  <button class="btn btn-y" onclick="parseWorkout()">PARSE WORKOUT</button>
  <div class="preview" id="preview">
    <div class="preview-hd">Detected exercises</div>
    <div id="prev-list"></div>
    <div style="padding:10px 14px">
      <button class="btn btn-y" onclick="startWorkout()" style="margin-top:0">START SESSION</button>
    </div>
  </div>
</div>

<div id="pg-workout" class="page">
  <div class="wk-hd">
    <div class="wk-title" id="wk-title">WORKOUT</div>
    <div class="wk-sub" id="wk-sub"></div>
    <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  </div>
  <div id="wk-content"></div>
  <button class="btn btn-y" style="margin-top:16px" onclick="finishWorkout()">FINISH SESSION</button>
</div>

<div id="pg-history" class="page">
  <div class="hist-hd"><h2>HISTORY</h2></div>
  <div id="hist-list"></div>
</div>

<nav class="bnav">
  <button class="btab on" id="tab-new" onclick="showPage('new')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M5 4h2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    New
  </button>
  <button class="btab" id="tab-workout" onclick="showPage('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
    Workout
  </button>
  <button class="btab" id="tab-history" onclick="showPage('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    History
  </button>
</nav>
<div class="toast" id="toast"></div>

<script>
var cw = null;
var wh = [];
try { wh = JSON.parse(localStorage.getItem('ironlog_v2') || '[]'); } catch(e) { wh = []; }

// ── DETECT EXERCISE HEADER ──
// Supports both formats:
//   Format A: "1️⃣ Barbell Bench Press"  (emoji key)
//   Format B: "1. Primary — Push Press"  (plain number dot)
//   Format B: "1. Secondary — Pull-Ups"
function isExerciseHead(l) {
  // Format A: starts with digit, contains the combining keycap emoji
  if (/^[1-9]/.test(l) && l.indexOf('\u20E3') !== -1) return true;
  // Format B: "1." or "1. " at start, followed by text (not just a number)
  if (/^[1-9][0-9]?\.\s+\S/.test(l)) return true;
  return false;
}

// Clean exercise name from both formats
function cleanName(l) {
  // Remove emoji number: "1️⃣ "
  l = l.replace(/^[1-9][0-9]?\uFE0F\u20E3\s*/, '');
  // Remove plain number dot: "1. " or "1. Primary — "
  l = l.replace(/^[1-9][0-9]?\.\s+/, '');
  // Remove category prefixes like "Primary — ", "Secondary — ", "Accessory — "
  l = l.replace(/^(Primary|Secondary|Accessory|Athletic\s+\w+|Micro[^\u2014\-]*|Primary\s+Lift)\s*[\u2014\-\u2013]+\s*/i, '');
  // Remove parenthetical notes
  l = l.replace(/\(Primary[^)]*\)/gi, '').replace(/\([^)]*\)/g, '');
  return l.trim();
}

// Is this a finisher/conditioning section that should NOT be a tracked exercise?
function isFinisherHead(l) {
  return /^(conditioning|optional finisher|breathing|grip\s*\(optional\)|optional conditioning)/i.test(l);
}

// Is this a stop line (notes section)?
function isStopHead(l) {
  return /^(session notes|notes for today|key instruction|if session runs short|this sets you up)/i.test(l);
}

// ── EXTRACT WEIGHT from a line ──
function extractKg(l) {
  // Matches: ~50-55 kg, 160-180 kg, +22.5 kg, 50 kg
  var m = l.match(/~?\+?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/i);
  return m ? m[1] : '';
}

// ── PARSE ──
function parseWorkout() {
  var txt = document.getElementById('txt').value.trim();
  if (!txt) { toast('Paste a workout first!'); return; }

  var lines = txt.split('\n');
  var exercises = [];
  var warmup = [];
  var finishers = [];
  var current = null;
  var inWU = false;
  var inWUProg = false;
  var inSub = false;
  var inFin = false;
  var finCurrent = null;

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l) continue;

    // Top-level warmup section heading: "Warm-up (5-6 min)"
    if (/^warm[\s-]?up\s*\(/i.test(l)) {
      if (current) { exercises.push(current); current = null; }
      inWU = true; inFin = false; continue;
    }

    // Numbered exercise header
    if (isExerciseHead(l)) {
      if (current) exercises.push(current);
      if (finCurrent) { finishers.push(finCurrent); finCurrent = null; }
      inWU = false; inWUProg = false; inSub = false; inFin = false;

      var nm = cleanName(l);

      // Check if sets/reps are on the same header line e.g. "4×6 reps"
      var inlineSR = l.match(/(\d+)\s*[x\xD7]\s*([\d\u2013\-\/]+)\s*(?:reps?)?/i);
      var inlineW = extractKg(l);

      current = {
        name: nm,
        sets: inlineSR ? parseInt(inlineSR[1]) : 4,
        reps: inlineSR ? inlineSR[2] : '8-10',
        weight: inlineW,
        warmup: [],
        topset: null,
        backoff: null
      };
      continue;
    }

    // Finisher section headers
    if (isFinisherHead(l)) {
      if (current) { exercises.push(current); current = null; }
      if (finCurrent) finishers.push(finCurrent);
      finCurrent = { title: l, lines: [] };
      inFin = true; inWU = false; continue;
    }

    // Stop collecting at notes sections
    if (isStopHead(l)) {
      if (current) { exercises.push(current); current = null; }
      if (finCurrent) { finishers.push(finCurrent); finCurrent = null; }
      inFin = false; inWU = false; continue;
    }

    // Finisher lines
    if (inFin && finCurrent) { finCurrent.lines.push(l); continue; }

    // Top-level warmup lines
    if (inWU) {
      if (l.length > 3 && !/^\d+[\s-]\d+\s*min/i.test(l)) warmup.push(l.replace(/^[-*\u2022]\s*/, ''));
      continue;
    }

    if (!current) continue;

    // Skip substitution blocks
    if (/^\u2757|^substitute/i.test(l)) { inSub = true; continue; }
    if (inSub) {
      if (/^strict cues|^working sets|^top set|^back.off|^only if pain/i.test(l)) inSub = false;
      else continue;
    }

    // Section markers inside exercise
    if (/^warm[\s-]?up sets?:?$/i.test(l) || /^warm[\s-]?up progression/i.test(l)) { inWUProg = true; continue; }
    if (/^neural primer/i.test(l)) { inWUProg = false; continue; }
    if (/^working sets?:?$/i.test(l)) { inWUProg = false; continue; }
    if (/^strict cues|^focus:|^note:/i.test(l)) continue;

    // Neural primer / single primer (skip from working sets)
    if (/primer single|neural primer/i.test(l)) continue;
    if (/@\s*\+?[\d.]+\s*kg/.test(l) && /^\d+\s*[x\xD7]\s*\d+/i.test(l)) continue;

    // Warmup progression sets inside exercise
    if (inWUProg) {
      if (/^bodyweight/i.test(l)) {
        var r = l.match(/[x\xD7]\s*(\d+)/i);
        current.warmup.push({ w: 'BW', r: r ? r[1] : '5' });
      } else if (/^[\+\d~]/.test(l) && /[x\xD7]/.test(l)) {
        var wm0 = l.match(/~?\+?([\d.]+)/);
        var rm0 = l.match(/[x\xD7]\s*(\d+)/i);
        if (wm0 && rm0) current.warmup.push({ w: wm0[1], r: rm0[1] });
      }
      continue;
    }

    // Top set — handles both:
    //   "Top set: 105 kg × 4–6"
    //   "Top set: 4–6 reps" + next line "→ Target: ~50–55 kg"
    if (/^top set:/i.test(l)) {
      var tw = extractKg(l);
      var tr = l.match(/[x\xD7:]\s*([\d\u2013\-]+)\s*(?:reps?)?/i);
      if (!tr) tr = l.match(/([\d\u2013\-]+)\s*reps?/i);
      current.topset = { w: tw, r: tr ? tr[1] : '4-6' };
      // Look ahead for "→ Target: ~50 kg" line
      if (!tw) {
        for (var j = i+1; j < Math.min(i+4, lines.length); j++) {
          var nl = lines[j].trim();
          if (/target:|^\u2192/.test(nl)) {
            var tw2 = extractKg(nl);
            if (tw2) { current.topset.w = tw2; break; }
          }
        }
      }
      continue;
    }

    // Arrow target line "→ Target: ~50–55 kg" (used with top set)
    if (/^\u2192\s*target:|^target:/i.test(l)) {
      if (current.topset && !current.topset.w) current.topset.w = extractKg(l);
      continue;
    }

    // Back-off — handles:
    //   "Back-off: 3×5 @ 95 kg"
    //   "Back-off sets: 3×5–6 reps (~90%)"
    if (/^back[\s-]?off/i.test(l)) {
      var bc = l.match(/(\d+)\s*[x\xD7]/i);
      var br = l.match(/[x\xD7]\s*([\d\u2013\-]+)/i);
      var bw = extractKg(l);
      current.backoff = { n: bc ? parseInt(bc[1]) : 3, r: br ? br[1] : '5', w: bw };
      continue;
    }

    // Standard "N sets × reps" or "N×reps" line
    var sm = l.match(/^(\d+)\s*[x\xD7]\s*([\d\u2013\-\/]+)\s*(?:reps?)?(?:\s*\/\s*leg)?/i);
    if (!sm) sm = l.match(/^(\d+)\s*sets?\s*[x\xD7]\s*([\d\u2013\-\/]+)/i);
    if (sm && !current.topset) {
      current.sets = parseInt(sm[1]);
      current.reps = sm[2];
      continue;
    }

    // Suggested weight lines
    if (/suggested[:.]?|suggested load|suggested weight/i.test(l)) {
      var sw = extractKg(l);
      if (!sw) {
        var nl2 = lines[i+1] ? lines[i+1].trim() : '';
        sw = extractKg(nl2);
      }
      if (sw && !current.weight) current.weight = sw;
      continue;
    }

    // Standalone weight range line "30-36 kg DBs" or "160-180 kg"
    if (/^~?[\d.]+\s*[\u2013\-]\s*[\d.]+\s*kg/i.test(l) || /^~?\+?[\d.]+\s*kg/i.test(l)) {
      var sw2 = extractKg(l);
      if (sw2 && !current.weight) current.weight = sw2;
    }
  }

  if (current) exercises.push(current);
  if (finCurrent) finishers.push(finCurrent);

  if (!exercises.length) { toast('No exercises found — check format'); return; }

  // Attach history suggestions
  for (var ei = 0; ei < exercises.length; ei++) {
    exercises[ei].histSug = getLastWeight(exercises[ei].name);
  }

  // Get title and subtitle
  var title = 'WORKOUT';
  var sub = '';
  for (var li = 0; li < lines.length; li++) {
    var ll = lines[li].trim();
    if (/day\s*\d/i.test(ll) && title === 'WORKOUT') {
      title = ll.replace(/^[\u2014\-\u2013]+/, '').trim().toUpperCase();
    }
    if (/week\s*\d/i.test(ll) || /^target:/i.test(ll)) sub = ll;
  }

  cw = { title: title, sub: sub, warmup: warmup, exercises: exercises, finishers: finishers };

  // Render preview
  var html = '';
  for (var pi = 0; pi < exercises.length; pi++) {
    var ex = exercises[pi];
    var pw = ex.topset ? ex.topset.w : ex.weight;
    var psets = ex.topset ? ('1+' + (ex.backoff ? ex.backoff.n : 0) + ' sets') : (ex.sets + ' sets');
    html += '<div class="prev-ex"><span class="prev-n">' + (pi+1) + '</span><span class="prev-name">' + ex.name + '</span><span class="prev-meta">' + psets + (pw ? ' &middot; ' + pw + 'kg' : '') + '</span></div>';
  }
  document.getElementById('prev-list').innerHTML = html;
  document.getElementById('preview').style.display = 'block';
  toast('Found ' + exercises.length + ' exercises!');
}

// ── HISTORY ──
function getLastWeight(name) {
  var n1 = name.toLowerCase().replace(/[^a-z0-9]/g, '');
  for (var i = wh.length - 1; i >= 0; i--) {
    for (var j = 0; j < wh[i].exercises.length; j++) {
      var ex = wh[i].exercises[j];
      if (ex.name.toLowerCase().replace(/[^a-z0-9]/g, '') === n1) {
        var done = [];
        for (var k = 0; k < ex.sets.length; k++) {
          if (ex.sets[k].done && ex.sets[k].w) done.push(parseFloat(ex.sets[k].w));
        }
        if (done.length) return { w: Math.max.apply(null, done), date: wh[i].date };
      }
    }
  }
  return null;
}

function bestWeight(ex) {
  if (ex.histSug) return (ex.histSug.w + 2.5).toFixed(1);
  if (ex.topset && ex.topset.w) return ex.topset.w;
  if (ex.weight) return ex.weight;
  return '';
}

// ── RENDER WORKOUT ──
