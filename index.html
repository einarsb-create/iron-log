<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f0f0f">
<title>IRON LOG</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0f0f0;font-family:Arial,sans-serif;font-size:15px}
.nav{position:fixed;top:0;left:0;right:0;background:#0f0f0f;border-bottom:1px solid #2e2e2e;height:56px;display:flex;align-items:center;padding:0 16px}
.logo{font-size:22px;font-weight:900;color:#e8ff47;letter-spacing:3px}
.page{display:none;padding:68px 16px 80px}
.page.active{display:block}
textarea{width:100%;height:200px;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:10px;color:#f0f0f0;font-size:12px;padding:14px;resize:none;outline:none}
.btn{display:block;width:100%;padding:14px;border-radius:10px;border:none;font-size:18px;font-weight:900;cursor:pointer;margin-top:10px;letter-spacing:1px}
.btn-y{background:#e8ff47;color:#000}
.preview{margin-top:16px;background:#1a1a1a;border-radius:10px;border:1px solid #2e2e2e;overflow:hidden;display:none}
.preview-hd{padding:10px 14px;border-bottom:1px solid #2e2e2e;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px}
.prev-ex{padding:11px 14px;border-bottom:1px solid #2e2e2e;display:flex;align-items:center;gap:10px}
.prev-ex:last-child{border-bottom:none}
.prev-n{font-size:18px;font-weight:900;color:#e8ff47;min-width:22px}
.prev-name{font-weight:600;flex:1;font-size:14px}
.prev-meta{font-size:11px;color:#666}
.wk-title{font-size:28px;font-weight:900;letter-spacing:1px;margin-bottom:4px}
.wk-sub{color:#666;font-size:12px;margin-bottom:10px}
.prog-wrap{background:#222;border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden}
.prog-bar{height:100%;background:#e8ff47;border-radius:4px;transition:width .3s}
.card{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;margin-bottom:10px;overflow:hidden}
.card.done{border-color:#2a3a1a;background:#131a0e}
.card-hd{padding:13px 15px;display:flex;align-items:flex-start;gap:11px;cursor:pointer;user-select:none}
.card-num{font-size:22px;font-weight:900;color:#e8ff47;min-width:26px}
.card.done .card-num{color:#4a6a2a}
.card-info{flex:1}
.card-name{font-weight:700;font-size:15px}
.card.done .card-name{color:#555}
.card-meta{font-size:12px;color:#666;margin-top:2px}
.card-sug{font-size:11px;color:#ff6b35;margin-top:3px;font-weight:600}
.card-hist{font-size:11px;color:#5a9a5a;margin-top:2px}
.chev{color:#666;font-size:20px;transition:transform .2s}
.card.open .chev{transform:rotate(180deg)}
.card-body{display:none;padding:0 15px 13px}
.card.open .card-body{display:block}
table{width:100%;border-collapse:collapse;margin-bottom:8px}
thead th{text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;padding:0 0 7px}
thead th:last-child{text-align:center}
.srow td{padding:4px 0;vertical-align:middle}
.slbl{font-size:15px;font-weight:700;color:#666;width:52px}
.srow.done .slbl{color:#4a6a2a}
.starget{font-size:11px;color:#666;width:60px}
.winput{background:#222;border:1px solid #2e2e2e;border-radius:7px;color:#f0f0f0;font-size:14px;padding:7px 8px;width:76px;outline:none;text-align:right}
.wunit{font-size:11px;color:#666;margin-left:3px}
.chkcol{text-align:center;width:40px}
.chk{width:27px;height:27px;border-radius:7px;border:2px solid #2e2e2e;background:none;cursor:pointer;display:inline-flex;align-items:center;justify-content:center}
.chk.on{background:#e8ff47;border-color:#e8ff47}
.chk svg{display:none}
.chk.on svg{display:block}
.sec-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;padding:7px 0 3px;display:table-cell}
.wu-hd{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#666;padding:10px 15px 6px;border-top:1px solid #2e2e2e;margin-bottom:2px}
.wu-item{padding:7px 15px;font-size:13px;color:#666;display:flex;align-items:center;gap:10px}
.wu-chk{width:20px;height:20px;border-radius:5px;border:1.5px solid #2e2e2e;background:none;cursor:pointer;flex-shrink:0}
.wu-chk.on{background:#222;border-color:#4a6a2a}
.fin-card .card-num{color:#ff6b35}
.hist-hd h2{font-size:32px;font-weight:900;color:#e8ff47;letter-spacing:1px;margin-bottom:16px}
.sess{background:#1a1a1a;border:1px solid #2e2e2e;border-radius:12px;margin-bottom:10px;overflow:hidden}
.sess-hd{padding:13px 15px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.sess-title{font-weight:700;font-size:14px}
.sess-date{font-size:11px;color:#666;margin-top:2px}
.sess-badge{background:#222;border-radius:6px;padding:4px 9px;font-size:11px;color:#666}
.sess-body{display:none;padding:0 15px 13px}
.sess.open .sess-body{display:block}
.hex{padding:9px 0;border-top:1px solid #2e2e2e}
.hex-name{font-weight:600;font-size:13px;margin-bottom:5px}
.hsets{display:flex;flex-wrap:wrap;gap:5px}
.hset{background:#222;border-radius:6px;padding:4px 9px;font-size:12px}
.hset.on{border:1px solid #2a3a1a;color:#7ab85a}
.empty{text-align:center;padding:50px 20px;color:#666;font-size:14px}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#0f0f0f;border-top:1px solid #2e2e2e;display:flex;height:62px}
.btab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:#666;cursor:pointer;font-size:10px;font-weight:600}
.btab.on{color:#e8ff47}
.btab svg{width:22px;height:22px}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(16px);background:#e8ff47;color:#000;font-weight:700;font-size:13px;padding:9px 18px;border-radius:100px;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap;z-index:200}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<nav class="nav"><span class="logo">IRON LOG</span></nav>

<div id="pg-new" class="page active">
  <div style="margin-bottom:14px">
    <h2 style="font-size:28px;font-weight:900;color:#e8ff47;letter-spacing:1px">NEW SESSION</h2>
    <p style="color:#666;font-size:13px;margin-top:3px">Paste your ChatGPT workout below</p>
  </div>
  <textarea id="txt" placeholder="Paste your workout here..."></textarea>
  <button class="btn btn-y" onclick="parseWorkout()">PARSE WORKOUT</button>
  <div class="preview" id="preview">
    <div class="preview-hd">Detected exercises</div>
    <div id="prev-list"></div>
    <div style="padding:10px 14px">
      <button class="btn btn-y" onclick="startWorkout()" style="margin-top:0">START SESSION</button>
    </div>
  </div>
</div>

<div id="pg-workout" class="page">
  <div class="wk-title" id="wk-title">WORKOUT</div>
  <div class="wk-sub" id="wk-sub"></div>
  <div class="prog-wrap"><div class="prog-bar" id="prog" style="width:0%"></div></div>
  <div id="wk-content"></div>
  <button class="btn btn-y" style="margin-top:16px" onclick="finishWorkout()">FINISH SESSION</button>
</div>

<div id="pg-history" class="page">
  <div class="hist-hd"><h2>HISTORY</h2></div>
  <div id="hist-list"></div>
</div>

<nav class="bnav">
  <button class="btab on" id="tab-new" onclick="showPage('new')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="2" width="6" height="4" rx="1"/><path d="M5 4h2a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/></svg>
    New
  </button>
  <button class="btab" id="tab-workout" onclick="showPage('workout')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v16M18 4v16M3 8h4M17 8h4M3 16h4M17 16h4"/></svg>
    Workout
  </button>
  <button class="btab" id="tab-history" onclick="showPage('history')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    History
  </button>
</nav>
<div class="toast" id="toast"></div>

<script>
var cw = null;
var wh = [];
try { wh = JSON.parse(localStorage.getItem('ironlog_v2') || '[]'); } catch(e) { wh = []; }

function isExHead(l) {
  if (/^[1-9]/.test(l) && l.indexOf('\u20E3') !== -1) return true;
  if (/^[1-9][0-9]*\.\s+[A-Za-z]/.test(l)) return true;
  return false;
}

function getExName(l) {
  l = l.replace(/^[1-9][0-9]?\uFE0F\u20E3\s*/, '');
  l = l.replace(/^[1-9][0-9]*\.\s+/, '');
  l = l.replace(/^(Primary|Secondary|Accessory|Athletic Block|Micro.Conditioning)[^\u2014\u2013\-]*[\u2014\u2013\-]+\s*/i, '');
  l = l.replace(/\(Primary[^)]*\)/gi,'').replace(/\(Heavy\)/gi,'').replace(/\(Paused\)/gi,'');
  return l.trim();
}

function parseWorkout() {
  var txt = document.getElementById('txt').value.trim();
  if (!txt) { showToast('Paste a workout first!'); return; }
  var lines = txt.split('\n');
  var exercises = [], warmup = [], finishers = [];
  var current = null, inWU = false, inWUProg = false, inSub = false, inFin = false, finCurrent = null;

  for (var i = 0; i < lines.length; i++) {
    var l = lines[i].trim();
    if (!l) continue;

    if (/^warm[\s-]?up\s*\(/i.test(l)) { inWU = true; inFin = false; continue; }

    if (isExHead(l)) {
      if (current) exercises.push(current);
      if (finCurrent) { finishers.push(finCurrent); finCurrent = null; }
      inWU = false; inWUProg = false; inSub = false; inFin = false;
      current = { name: getExName(l), sets: 4, reps: '8-10', weight: '', warmup: [], topset: null, backoff: null };
      continue;
    }

    if (/^(conditioning|optional finisher|breathing|grip\s*\(optional\)|session notes|athletic finisher|optional conditioning)/i.test(l)) {
      if (current) { exercises.push(current); current = null; }
      if (finCurrent) finishers.push(finCurrent);
      finCurrent = { title: l, lines: [] };
      inFin = true; inWU = false; continue;
    }

    if (/^(notes for today|key instruction|intent$|if session runs short|if it feels short)/i.test(l)) {
      if (current) { exercises.push(current); current = null; }
      if (finCurrent) { finishers.push(finCurrent); finCurrent = null; }
      inFin = false; inWU = false; continue;
    }

    if (inFin && finCurrent) { finCurrent.lines.push(l); continue; }
    if (inWU) { if (l.length > 3 && !/^\d+[\s-]\d+\s*min/i.test(l)) warmup.push(l.replace(/^[-*\u2022]\s*/,'')); continue; }
    if (!current) continue;

    if (/^\u2757|^substitute\s*[\u2192>]/i.test(l)) { inSub = true; continue; }
    if (inSub) { if (/^strict cues|^working sets|^top set|^back.off|^\d+\s*sets/i.test(l)) inSub = false; else continue; }

    if (/^warm[\s-]?up sets?:?$|^warm[\s-]?up:?$|^warm[\s-]?up progression/i.test(l)) { inWUProg = true; continue; }
    if (/^neural primer|^strict cues|^focus:/i.test(l)) { inWUProg = false; continue; }
    if (/^working sets?:?$/i.test(l)) { inWUProg = false; continue; }

    if (/^primer single:/i.test(l)) {
      var pw = l.match(/~?([\d.]+)/);
      var pr = l.match(/[x\xD7]\s*(\d+)/i);
      if (pw) current.warmup.push({ w: pw[1], r: pr ? pr[1] : '1' });
      continue;
    }

    if (/@\s*\+?[\d.]+\s*kg/.test(l) && /^\d+\s*[x\xD7]\s*\d+/i.test(l)) continue;

    if (inWUProg) {
      if (/^bodyweight/i.test(l)) {
        var r2 = l.match(/[x\xD7]\s*(\d+)/i);
        current.warmup.push({ w: 'BW', r: r2 ? r2[1] : '5' });
      } else if (/^[\+\d~]/.test(l) && /[x\xD7]/.test(l)) {
        var wm = l.match(/~?\+?([\d.]+)/);
        var rm = l.match(/[x\xD7]\s*(\d+)/i);
        if (wm && rm) current.warmup.push({ w: wm[1], r: rm[1] });
      }
      continue;
    }

    if (/^top set:/i.test(l)) {
      var tr = l.match(/([\d\u2013\-]+)\s*reps?/i);
      var tw = l.match(/\+?~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      current.topset = { w: tw ? (tw[1]||tw[2]||'') : '', r: tr ? tr[1] : '4-6' };
      continue;
    }

    if (/^[\u2192]|^->\s*target/i.test(l)) {
      var aw = l.match(/~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      if (aw && current.topset) current.topset.w = aw[1];
      continue;
    }

    if (/^back[\s-]?off:/i.test(l)) {
      var bc = l.match(/(\d+)\s*[x\xD7]/i);
      var br = l.match(/[x\xD7]\s*(\d+)/i);
      var bw = l.match(/@\s*\+?~?([\d.]+)\s*kg/);
      current.backoff = { n: bc ? parseInt(bc[1]) : 3, r: br ? br[1] : '5', w: bw ? bw[1] : '' };
      continue;
    }

    if (/^suggested[\s:]/i.test(l) || /suggested load|suggested weight/i.test(l)) {
      var nl = lines[i+1] ? lines[i+1].trim() : '';
      var sw = (l + ' ' + nl).match(/\+?~?([\d.]+)\s*(?:[\u2013\-][\d.]+)?\s*kg/);
      if (sw && !current.weight) current.weight = sw[1];
      continue;
    }

    if (/^[\d.]+\s*[\u2013\-]\s*[\d.]+\s*kg/.test(l) || /^\+?[\d.]+\s*kg$/.test(l)) {
      var sw2 = l.match(/([\d.]+)/);
      if (sw2 && !current.weight) current.weight = sw2[1];
    }

    if (!current.topset) {
      var sm = l.match(/^(\d+)\s*[x\xD7]\s*([\d\u2013\-]+(?:\/\w+)?)/i) || l.match(/^(\d+)\s*sets?\s*[x\xD7]\s*([\d\u2013\-]+)/i);
      if (sm) { current.sets = parseInt(sm[1]); current.reps = sm[2]; continue; }
    }
  }
  if (current) exercises.push(current);
  if (finCurrent) finishers.push(finCurrent);

  if (!exercises.length) { showToast('No exercises found'); return; }

  for (var ei = 0; ei < exercises.length; ei++) exercises[ei].histSug = getLastWeight(exercises[ei].name);

  var title = 'WORKOUT', sub = '';
  for (var ti = 0; ti < lines.length; ti++) {
    var tl = lines[ti].trim();
    if (/day\s*\d/i.test(tl) && title === 'WORKOUT') title = tl.replace(/^[\u2014\-\u2013]+/,'').trim().toUpperCase();
    if (/week\s*\d/i.test(tl) || /^target:/i.test(tl)) sub += tl + '  ';
  }

  cw = { title: title, sub: sub.trim(), warmup: warmup, exercises: exercises, finishers: finishers };

  var html = '';
  for (var pi = 0; pi < exercises.length; pi++) {
    var ex = exercises[pi];
    var w = ex.topset ? ex.topset.w : ex.weight;
    var ts = ex.topset ? (1 + (ex.backoff ? ex.backoff.n : 0)) : ex.sets;
    html += '<div class="prev-ex"><span class="prev-n">' + (pi+1) + '</span><span class="prev-name">' + ex.name + '</span><span class="prev-meta">' + ts + ' sets' + (w ? ' &middot; ' + w + 'kg' : '') + '</span></div>';
  }
  document.getElementById('prev-list').innerHTML = html;
  document.getElementById('preview').style.display = 'block';
  showToast('Found ' + exercises.length + ' exercises!');
}

function getLastWeight(name) {
  var n1 = name.toLowerCase().replace(/[^a-z0-9]/g,'');
  for (var i = wh.length - 1; i >= 0; i--) {
    for (var j = 0; j < wh[i].exercises.length; j++) {
      var ex = wh[i].exercises[j];
      if (ex.name.toLowerCase().replace(/[^a-z0-9]/g,'') === n1) {
        var best = 0;
        for (var k = 0; k < ex.sets.length; k++) {
          if (ex.sets[k].done && ex.sets[k].w && parseFloat(ex.sets[k].w) > best) best = parseFloat(ex.sets[k].w);
        }
        if (best) return { w: best, date: wh[i].date };
      }
    }
  }
  return null;
}

function bestW(ex) {
  if (ex.histSug) return (ex.histSug.w + 2.5).toFixed(1);
  if (ex.topset && ex.topset.w) return ex.topset.w;
  return ex.weight || '';
}

function startWorkout() { if (!cw) return; renderWorkout(); showPage('workout'); }

function renderWorkout() {
  document.getElementById('wk-title').textContent = cw.title;
  document.getElementById('wk-sub').textContent = cw.sub;
  var html = '';

  if (cw.warmup.length) {
    html += '<div style="margin-bottom:10px"><div class="wu-hd">Warm-up</div>';
    for (var wi = 0; wi < cw.warmup.length; wi++) {
      html += '<div class="wu-item"><button class="wu-chk" onclick="this.classList.toggle(\'on\')"></button><span>' + cw.warmup[wi] + '</span></div>';
    }
    html += '</div>';
  }

  for (var ei = 0; ei < cw.exercises.length; ei++) {
    var ex = cw.exercises[ei];
    var bw = bestW(ex);
    var hline = ex.histSug ? '<div class="card-hist">Last: ' + ex.histSug.w + 'kg &rarr; Try ' + bw + 'kg</div>' : (bw ? '<div class="card-sug">Suggested: ' + bw + 'kg</div>' : '');
    var ts = ex.topset ? (1 + (ex.backoff ? ex.backoff.n : 0)) : ex.sets;
    var rows = '';
    var si = 0;

    if (ex.warmup.length) {
      rows += '<tr><td colspan="4" class="sec-lbl">Warm-up</td></tr>';
      for (var wu = 0; wu < ex.warmup.length; wu++) {
        var ws = ex.warmup[wu];
        rows += '<tr class="srow"><td class="slbl">W' + (wu+1) + '</td><td class="starget">' + ws.w + (ws.w !== 'BW' ? 'kg' : '') + ' x' + ws.r + '</td><td><input class="winput" type="number" step="0.5" placeholder="' + (ws.w !== 'BW' ? ws.w : '0') + '" style="width:68px"><span class="wunit">kg</span></td><td class="chkcol"><button class="chk" onclick="toggleChk(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button></td></tr>';
      }
    }

    rows += '<tr><td colspan="4" class="sec-lbl">Working sets</td></tr>';

    if (ex.topset) {
      rows += '<tr class="srow" data-ei="' + ei + '" data-si="' + si + '"><td class="slbl">TOP</td><td class="starget">' + ex.topset.r + ' reps</td><td><input class="winput" type="number" step="0.5" placeholder="' + (ex.topset.w || bw || '') + '" data-ei="' + ei + '" data-si="' + si + '"><span class="wunit">kg</span></td><td class="chkcol"><button class="chk" data-ei="' + ei + '" data-si="' + si + '" onclick="toggleChk(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button></td></tr>';
      si++;
      if (ex.backoff) {
        for (var b = 0; b < ex.backoff.n; b++, si++) {
          rows += '<tr class="srow" data-ei="' + ei + '" data-si="' + si + '"><td class="slbl">BO' + (b+1) + '</td><td class="starget">' + ex.backoff.r + ' reps</td><td><input class="winput" type="number" step="0.5" placeholder="' + (ex.backoff.w || bw || '') + '" data-ei="' + ei + '" data-si="' + si + '"><span class="wunit">kg</span></td><td class="chkcol"><button class="chk" data-ei="' + ei + '" data-si="' + si + '" onclick="toggleChk(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button></td></tr>';
        }
      }
    } else {
      for (var s = 0; s < ex.sets; s++, si++) {
        rows += '<tr class="srow" data-ei="' + ei + '" data-si="' + si + '"><td class="slbl">S' + (s+1) + '</td><td class="starget">' + ex.reps + ' reps</td><td><input class="winput" type="number" step="0.5" placeholder="' + (bw || '') + '" data-ei="' + ei + '" data-si="' + si + '"><span class="wunit">kg</span></td><td class="chkcol"><button class="chk" data-ei="' + ei + '" data-si="' + si + '" onclick="toggleChk(this)"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></button></td></tr>';
      }
    }

    html += '<div class="card" id="ec' + ei + '"><div class="card-hd" onclick="toggleCard(\'ec' + ei + '\')"><span class="card-num">' + (ei+1) + '</span><div class="card-info"><div class="card-name">' + ex.name + '</div><div class="card-meta">' + ts + ' sets &middot; ' + (ex.topset ? ex.topset.r : ex.reps) + ' reps</div>' + hline + '</div><span class="chev">v</span></div><div class="card-body"><table><thead><tr><th>Set</th><th>Target</th><th>Weight</th><th style="text-align:center">Done</th></tr></thead><tbody id="tb' + ei + '">' + rows + '</tbody></table></div></div>';
  }

  if (cw.finishers.length) {
    html += '<div class="wu-hd" style="margin-top:8px">Finishers</div>';
    for (var fi = 0; fi < cw.finishers.length; fi++) {
